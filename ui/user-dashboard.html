<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ASIAGOLD | داشبورد</title>
  <link rel="stylesheet" href="./theme.css">
  <style>
    /* Base & Theme Overrides */
    body {
      background-color: var(--color-background, #f8f9fa);
      padding-bottom: 80px;
      /* Space for scrolling */
      margin: 0;
      font-family: var(--font-family, sans-serif);
    }

    /* 1) Fixed Header */
    .dashboard-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .header-back {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      color: var(--color-text-primary, #333);
    }

    .header-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 700;
      font-size: 16px;
      color: var(--color-text-primary, #333);
      white-space: nowrap;
    }

    /* Content Wrapper */
    .dashboard-content {
      padding: 20px;
      max-width: 600px;
      /* Mobile focused */
      margin: 0 auto;
    }

    /* Section 1: Summary Card */
    .summary-card {
      background: linear-gradient(135deg, #2A2A2A 0%, #1A1A1A 100%);
      color: #D4AF37;
      /* Gold */
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .summary-item {
      text-align: center;
    }

    .summary-value {
      font-size: 24px;
      font-weight: 800;
      display: block;
      margin-bottom: 4px;
    }

    .summary-label {
      font-size: 13px;
      opacity: 0.8;
      font-weight: 400;
    }

    .divider-vertical {
      width: 1px;
      height: 40px;
      background: rgba(212, 175, 55, 0.2);
    }

    /* Section 2: New Order Action */
    .action-section {
      margin-bottom: 32px;
    }

    .btn-new-order {
      width: 100%;
      background: var(--color-primary, #d4af37);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 18px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      cursor: pointer;
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-new-order:active {
      transform: scale(0.98);
    }

    /* Section 3: Orders List */
    .orders-section {
      margin-top: 20px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--color-text-secondary, #666);
      padding-right: 4px;
    }

    .order-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .order-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .order-code {
      font-weight: 700;
      font-size: 15px;
      color: #333;
    }

    .order-date {
      font-size: 12px;
      color: #999;
    }

    .order-status {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 20px;
      background: #fff8e1;
      color: #f57f17;
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      color: #999;
      font-size: 13px;
      padding: 30px;
      border: 2px dashed #eee;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="dashboard-header">
    <div class="header-right">
      <button class="header-back" id="btn-back">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18l6-6-6-6" />
        </svg>
      </button>
      <!-- Logo (Small, Right) -->
      <img src="./assets/logo.svg" alt="" class="header-logo">
    </div>

    <!-- User Name (Center) -->
    <div class="header-title" id="user-name-display">کاربر</div>

    <!-- Placeholder for left balance -->
    <div style="width: 60px;"></div>
  </header>

  <div class="dashboard-content">

    <!-- 1. Summary Stats -->
    <div class="summary-card">
      <div class="summary-item">
        <span class="summary-value" id="sum-count">0</span>
        <span class="summary-label">تعداد سفارش</span>
      </div>
      <div class="divider-vertical"></div>
      <div class="summary-item">
        <span class="summary-value" id="sum-weight">0</span>
        <span class="summary-label">وزن کل (گرم)</span>
      </div>
    </div>

    <!-- 2. New Order Action -->
    <div class="action-section">
      <button class="btn-new-order" id="btn-new-order">
        <span>+</span>
        <span>ثبت سفارش جدید</span>
      </button>
    </div>

    <!-- 3. Active Orders List -->
    <div class="orders-section">
      <div class="section-title">سفارش‌های فعال</div>
      <div id="orders-list">
        <!-- Populated by JS -->
        <div class="empty-state">سفارشی یافت نشد</div>
      </div>
    </div>

  </div>

  <script>
    (function () {
      // Data Keys
      const STORAGE_KEY_USER = "asiagold_app_user";
      const STORAGE_KEY_ORDERS = "asiagold_orders_v1";

      // Elements
      const elName = document.getElementById("user-name-display");
      const elSumCount = document.getElementById("sum-count");
      const elSumWeight = document.getElementById("sum-weight");
      const elOrdersList = document.getElementById("orders-list");
      const btnNewOrder = document.getElementById("btn-new-order");
      const btnBack = document.getElementById("btn-back");

      function init() {
        loadUser();
        loadOrders();
        setupEvents();
      }

      function loadUser() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY_USER);
          if (raw) {
            const user = JSON.parse(raw);
            // Display Name + Family
            const fullName = (user.name + " " + user.family).trim();
            elName.textContent = fullName || "کاربر مهمان";
          }
        } catch (e) {
          console.error("User load error", e);
        }
      }

      function loadOrders() {
        let orders = [];
        try {
          const raw = localStorage.getItem(STORAGE_KEY_ORDERS);
          if (raw) orders = JSON.parse(raw);
        } catch (e) { }

        // Filter Active Orders Only (Mock logic: all mock orders are 'active' for now)
        // In real app, filter by status !== 'delivered'

        renderSummary(orders);
        renderList(orders);
      }

      function renderSummary(orders) {
        const count = orders.length;
        let weight = 0;
        orders.forEach(o => {
          if (o.summary && o.summary.totalWeight) {
            weight += Number(o.summary.totalWeight);
          }
        });

        elSumCount.textContent = count;
        elSumWeight.textContent = weight.toLocaleString("fa-IR");
      }

      function renderList(orders) {
        if (!orders || orders.length === 0) {
          elOrdersList.innerHTML = '<div class="empty-state">سفارشی یافت نشد</div>';
          return;
        }

        elOrdersList.innerHTML = orders.map(o => {
          const code = o.code || "---";
          const date = o.dateFa || "---";
          const w = o.summary?.totalWeight ? Number(o.summary.totalWeight).toFixed(2) : "0";
          const statusText = "در حال بررسی"; // Mock status text

          return `
                        <div class="order-card">
                            <div class="order-info">
                                <span class="order-code">سفارش ${code}</span>
                                <span class="order-date">${date} • ${w} گرم</span>
                            </div>
                            <div class="order-status">${statusText}</div>
                        </div>
                    `;
        }).join("");
      }

      function setupEvents() {
        // New Order Flow -> Go to user-orders.html (Catalog Entry)
        btnNewOrder.addEventListener("click", () => {
          // We must ensure we land on the 'Root' of catalog
          window.location.href = "./user-orders.html";
        });

        // Back Button
        btnBack.addEventListener("click", () => {
          // In Dashboard, Back usually means exit app or go to Gate?
          // Gate checks 'approved', so it might loop. 
          // Ideally: Close WebApp or do nothing.
          // Ref: "One button, back to prev"
          if (window.history.length > 1) {
            window.history.back();
          }
        });
      }

      init();

    })();
  </script>
</body>

</html>
